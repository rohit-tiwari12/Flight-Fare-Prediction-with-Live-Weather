<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Fare Predictor</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            font-family: "Poppins", sans-serif;
            min-height: 100vh;
            padding-top: 40px;
        }

        .card {
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            color: #333;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border-radius: 10px;
            background-color: #0072ff;
            border: none;
            font-weight: bold;
        }

        .btn-primary:hover {
            background-color: #005ae0;
        }

        .result {
            margin-top: 20px;
            background: #005ae0;
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 22px;
            text-align: center;
        }

    </style>
</head>

<body>

<div class="container">
    <div class="col-md-6 offset-md-3">
        <div class="card">

            <h2>✈ Flight Fare Predictor</h2>

            <form action="/predict" method="post">

                <div class="form-group">
                    <label>Journey Date</label>
                    <input type="date" name="date" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Duration (Example: 2h 45m)</label>
                    <input type="text" name="duration" class="form-control" placeholder="e.g., 1h 30m" required>
                </div>

                <div class="form-group">
                    <label>Departure Time</label>
                    <input type="time" name="dep_time" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Arrival Time</label>
                    <input type="time" name="arr_time" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Source</label>
                    <select name="source" class="form-control" required>
                        <option value="Delhi">Delhi</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Kolkata">Kolkata</option>
                        <option value="Chennai">Chennai</option>
                        <option value="Banglore">Banglore</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Destination</label>
                    <select name="destination" class="form-control" required>
                        <option value="Cochin">Cochin</option>
                        <option value="Delhi">Delhi</option>
                        <option value="New Delhi">New Delhi</option>
                        <option value="Hyderabad">Hyderabad</option>
                        <option value="Kolkata">Kolkata</option>
                        <option value="Banglore">Banglore</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Stops</label>
                    <select name="stops" class="form-control" required>
                        <option value="0">Non-Stop</option>
                        <option value="1">1 Stop</option>
                        <option value="2">2 Stops</option>
                        <option value="3">3 Stops</option>
                        <option value="4">4 Stops</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Airline</label>
                    <select name="airline" class="form-control" required>
                        <option value="Jet Airways">Jet Airways</option>
                        <option value="IndiGo">IndiGo</option>
                        <option value="Air India">Air India</option>
                        <option value="Multiple carriers">Multiple carriers</option>
                        <option value="SpiceJet">SpiceJet</option>
                        <option value="Vistara">Vistara</option>
                        <option value="Air Asia">Air Asia</option>
                        <option value="GoAir">GoAir</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Predict Fare</button>

            </form>

            {% if prediction_text %}
            <div class="result">
                {{ prediction_text }}
            </div>
            {% endif %}

        </div>
    </div>
</div>

</body>
</html>
